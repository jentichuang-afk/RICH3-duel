# RICH3 雙人對戰 - Render.com 部署
services:
  - type: web
    name: rich3-duel
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python rich3_deploy.py
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: "1"
